name: Deploy SyncUp

on:
  push:
    branches:
      - kishor-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build \
            -t kishor3557/syncup-backend:latest \
            ./backend
        
      - name: Push Backend Image
        run: |
          docker push kishor3557/syncup-backend:latest

      - name: Build Frontend Image
        run: |
          docker build \
            -t kishor3557/syncup-frontend:latest \
            ./frontend/client

      - name: Push Frontend Image
        run: |
          docker push kishor3557/syncup-frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~
            docker pull kishor3557/syncup-backend:latest
            docker pull kishor3557/syncup-frontend:latest
            docker compose -f docker-compose.prod.yml up -d